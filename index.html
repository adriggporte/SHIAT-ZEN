<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro Shiatsu Aldaia · Masaje Terapéutico Japonés</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    :root {
      --color-fondo: #FAFAF8;
      --color-violeta: #9B7FA6;
      --color-violeta-oscuro: #7A5F87;
      --color-texto: #3A3330;
      --color-texto-suave: #7A7068;
      --fuente-titulo: 'Cormorant Garamond', serif;
      --fuente-cuerpo: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--fuente-cuerpo); background-color: var(--color-fondo); color: var(--color-texto); line-height: 1.7; }

    /* HEADER - Se mantiene funcional pero corregido */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 20px 0; transition: all 0.3s ease; background: transparent;
    }
    #header.scrolled {
      background: rgba(250,250,248,0.98);
      padding: 12px 0; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: var(--fuente-titulo); font-size: 1.5rem; color: #fff; }
    #header.scrolled .nav-logo { color: var(--color-texto); }
    .nav-links a { margin-left: 30px; font-size: 0.85rem; text-transform: uppercase; color: rgba(255,255,255,0.9); text-decoration: none; }
    #header.scrolled .nav-links a { color: var(--color-texto-suave); }

    /* HERO - Corregido para que el menú no tape */
    #hero {
      position: relative; min-height: 100vh; display: flex; align-items: center;
      padding-top: 80px; /* Espacio para el menú */
      background-size: cover; background-position: center;
    }
    #hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 1; }
    .hero-content { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 0 24px; color: #fff; }
    .hero-title { font-family: var(--fuente-titulo); font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 20px; }

    /* SECCIÓN INTRODUCCIÓN (SOBRE) - Ordenada */
    #sobre { padding: 100px 0; max-width: 1100px; margin: 0 auto; padding: 100px 24px; }
    .sobre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .sobre-imagen img { width: 100%; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .sobre-texto h2 { font-family: var(--fuente-titulo); font-size: 2.8rem; margin-bottom: 25px; color: var(--color-violeta); }

    /* CONTACTO - Super ordenado, sin emojis y con Mapa */
    #contacto { padding: 100px 0; background: #fff; }
    .contacto-container { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    .contacto-info h2 { font-family: var(--fuente-titulo); font-size: 2.5rem; margin-bottom: 30px; }
    .dato-linea { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
    .dato-linea strong { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--color-violeta); letter-spacing: 1px; }
    .dato-linea p { font-size: 1.1rem; color: var(--color-texto); }
    
    .mapa-box { width: 100%; height: 450px; background: #f7f7f7; border-radius: 8px; overflow: hidden; }
    .mapa-box iframe { width: 100%; height: 100%; border: 0; }

    /* FORMULARIO */
    form { display: grid; gap: 15px; margin-top: 30px; }
    input, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; }
    .btn-enviar { background: var(--color-violeta); color: #fff; border: none; padding: 15px; cursor: pointer; transition: 0.3s; }
    .btn-enviar:hover { background: var(--color-violeta-oscuro); }

    @media (max-width: 768px) { .sobre-grid, .contacto-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <header id="header">
    <div class="nav-inner">
      <div class="nav-logo" id="negocio-nombre">SHIAT-ZEN</div>
      <nav class="nav-links">
        <a href="#hero">Inicio</a>
        <a href="#sobre">Sobre mí</a>
        <a href="#contacto">Contacto</a>
      </nav>
    </div>
  </header>

  <section id="hero">
    <div class="hero-content">
      <h1 class="hero-title" id="hero-titular"></h1>
      <p id="hero-subtitular" style="font-size: 1.2rem; max-width: 600px; margin-bottom: 30px;"></p>
      <a href="#contacto" class="btn-enviar" id="hero-cta" style="text-decoration:none; display:inline-block;"></a>
    </div>
  </section>

  <section id="sobre">
    <div class="sobre-grid">
      <div class="sobre-imagen">
        <img id="sobre-imagen" src="" alt="Sesión de Shiatsu">
      </div>
      <div class="sobre-texto">
        <h2 id="sobre-titulo">Sobre el Centro</h2>
        <div id="sobre-parrafos"></div>
      </div>
    </div>
  </section>

  <section id="contacto">
    <div class="contacto-container">
      <div class="contacto-info">
        <h2>Contacto</h2>
        <div class="dato-linea">
          <strong>Teléfono</strong>
          <p id="cont-tel"></p>
        </div>
        <div class="dato-linea">
          <strong>Email</strong>
          <p id="cont-email"></p>
        </div>
        <div class="dato-linea">
          <strong>Dirección</strong>
          <p id="cont-dir"></p>
        </div>
        <div class="dato-linea">
          <strong>Horario de atención</strong>
          <p id="cont-hor"></p>
        </div>

        <form id="form-contacto">
          <input type="text" name="from_name" placeholder="Tu nombre completo" required>
          <input type="email" name="from_email" placeholder="Correo electrónico" required>
          <textarea name="message" rows="4" placeholder="¿En qué puedo ayudarte?" required></textarea>
          <button type="submit" class="btn-enviar" id="btn-enviar-contacto">Enviar mensaje</button>
        </form>
      </div>

      <div class="mapa-box">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3079.866!2d-0.46!3d39.46!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzlCsDI3JzM2LjAiTiAwwrAyNyczNi4wIlc!5e0!3m2!1ses!2ses!4v1711200000000" allowfullscreen="" loading="lazy"></iframe>
      </div>
    </div>
  </section>

  <script>
    // Carga dinámica desde contenido.json
    fetch('contenido.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('negocio-nombre').textContent = data.negocio.nombre;
        document.getElementById('hero-titular').innerHTML = data.hero.titular;
        document.getElementById('hero-subtitular').textContent = data.hero.subtitular;
        document.getElementById('hero-cta').textContent = data.hero.cta_texto;
        document.getElementById('hero').style.backgroundImage = `url(${data.hero.imagen})`;
        
        document.getElementById('sobre-imagen').src = data.sobre.imagen;
        const pCont = document.getElementById('sobre-parrafos');
        data.sobre.parrafos.forEach(p => {
          const el = document.createElement('p');
          el.textContent = p; el.style.marginBottom = "15px";
          pCont.appendChild(el);
        });

        // Contacto sin emojis (limpiando el texto del JSON)
        document.getElementById('cont-tel').textContent = data.contacto.telefono.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
        document.getElementById('cont-email').textContent = data.contacto.email.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
        document.getElementById('cont-dir').textContent = data.contacto.direccion.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
        document.getElementById('cont-hor').textContent = data.contacto.horario.replace(/[\u{1F300}-\u{1F9FF}]/gu, '');
      });

    // Efecto menú al scroll (no quita nada, solo añade fondo)
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) header.classList.add('scrolled');
      else header.classList.remove('scrolled');
    });
  </script>
</body>
</html>
